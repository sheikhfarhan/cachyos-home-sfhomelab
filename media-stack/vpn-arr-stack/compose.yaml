# ----------------------------------------
# Network Definition - Have already set this up beforehand
# ----------------------------------------
networks:
  dockerapps-net:
    external: true
services:
  ##################################################
  # 1. GLUETUN (VPN Tunnel)
  ##################################################
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    # This setting ensures IPv6 is enabled INSIDE the container
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.11 
        ipv6_address: fd00:dead:beef:2::11
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.sfhomelab.com:100.110.20.2"
    ports:
      # --- GLUETUN CONTROL SERVER ---
      - "100.110.20.1:8001:8000" # Tailscale Access
      - "[fd7a:115c:a1e0::5a39:3504]:8001:8000" # IPv6 Access
      - "127.0.0.1:8001:8000"    # Localhost/SSH Access

      # --- QBITTORRENT WEB UI ---
      - "100.110.20.1:8080:8080" # Tailscale Access
      - "[fd7a:115c:a1e0::5a39:3504]:8080:8080" # IPv6 Access
      - "127.0.0.1:8080:8080"    # Localhost/SSH Access

      # --- TRANSMISSION WEB UI ---
      - "100.110.20.1:9091:9091" # Tailscale Access
      - "[fd7a:115c:a1e0::5a39:3504]:9091:9091" # IPv6 Access
      - "127.0.0.1:9091:9091"    # Localhost/SSH Access
    volumes:
      # personal preference to split the config and auth folder locally. With only ./gluetun:/gluetun will also simply work
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/gluetun/config:/gluetun
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/gluetun/auth:/gluetun/auth:ro
      - /lib/modules:/lib/modules:ro
    environment:
      # --- General Settings
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # --- VPN Settings
      - VPN_SERVICE_PROVIDER=airvpn # This one is hardcoded, as it won't change
      - VPN_TYPE=${VPN_TYPE}
      - VPN_IPV6=yes
      # --- WireGuard Settings
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      #- WIREGUARD_MTU=${WIREGUARD_MTU}
      # --- Port Forwarding
      - FIREWALL_VPN_INPUT_PORTS=${AIRVPN_PORT_QBIT},${AIRVPN_PORT_TRANS}
      # --- Adding below to prevent warning in logs and reduce ram usage
      - BLOCK_MALICIOUS=off
      - BLOCK_SURVEILLANCE=off
      - BLOCK_ADS=off
      # --- Disables DNS over TLS
      - DNS_UPSTREAM_RESOLVER_TYPE=plain
      # --- This maps internally to 1.1.1.1 (Cloudflare) and 8.8.8.8 (Google)
      - DNS_UPSTREAM_PLAIN_ADDRESSES=1.1.1.1:53,8.8.8.8:53
      #- LOG_LEVEL=debug
      # --- CONTROL SERVER SECURITY ---
      - HTTP_CONTROL_SERVER_LOG=${HTTP_CONTROL_SERVER_LOG}
      #- HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE=${GLUETUN_AUTH_JSON} # commeting this out since pivot to using config.toml
    restart: unless-stopped
  ##################################################
  # 2. QBITTORRENT (Client 1)
  ##################################################
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080 # This is the internal port. It is accessible on 8080 from the Gluetun service network.
      - WEBUI_HOST=* # Allows other containers to access the Web UI for integration
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/qbittorrent/config:/config
      - /mnt/crucial500/downloads:/downloads
    healthcheck:
      test: curl -f --silent --output /dev/null http://localhost:8080 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
  ##################################################
  # 3. TRANSMISSION (Client 2)
  ##################################################
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - USER=${TRANSMISSION_USER} # transmission username
      - PASS=${TRANSMISSION_PASS} # transmission password
      - WEBUI_PORT=9091 # Internal Web UI port (must match Gluetun mapping)
      - PEERPORT=${AIRVPN_PORT_TRANS}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/transmission/config:/config
      - /mnt/crucial500/downloads:/downloads
    #healthcheck:
    #  # We just want to know if the port is open!
    #  test: curl -s http://localhost:9091/ || exit 1
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    #  start_period: 20s
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
  ##################################################
  # 4. PROWLARR (Indexer Manager)
  ##################################################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr 
    networks: 
      dockerapps-net:
        ipv4_address: 172.20.0.20
        ipv6_address: fd00:dead:beef:2::20
    # This setting ensures IPv6 is enabled INSIDE the container
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    ports:
    # Allows secure access via Tailscale mesh
      - "100.110.20.1:9696:9696"
      - "[fd7a:115c:a1e0::5a39:3504]:9696:9696" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:9696:9696"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/prowlarr/config:/config
    depends_on:
      flaresolverr:
        condition: service_healthy
    restart: unless-stopped

##################################################
  # 10. JACKETT (Indexer 2) - NEW SERVICE
  ##################################################
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    hostname: jackett
    networks:
      dockerapps-net: 
        ipv4_address: 172.20.0.22
        ipv6_address: fd00:dead:beef:2::22
    # This setting ensures IPv6 is enabled INSIDE the container
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:9117:9117"
      - "[fd7a:115c:a1e0::5a39:3504]:9117:9117" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:9117:9117" 
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - AUTO_UPDATE=true #optional
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/jackett/config:/config
      # This is for .torrent files, good practice
      - /mnt/crucial500/downloads/jackett:/downloads
    #healthcheck:
    #  test: curl -f --silent --output /dev/null http://localhost:9117/ || exit 1
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    #  start_period: 30s
    restart: unless-stopped
    depends_on:
      flaresolverr:
        condition: service_healthy

  ##################################################
  # 5. RADARR (Movie Management)
  ##################################################
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.13  
        ipv6_address: fd00:dead:beef:2::13
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/radarr/config:/config
      - /mnt/vault/media:/media
      - /mnt/crucial500/downloads:/downloads
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:7878:7878"
      - "[fd7a:115c:a1e0::5a39:3504]:7878:7878" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:7878:7878"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
  ##################################################
  # 6. SONARR (TV Show Management)
  ##################################################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.14 
        ipv6_address: fd00:dead:beef:2::14
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/sonarr/config:/config
      - /mnt/vault/media:/media
      - /mnt/crucial500/downloads:/downloads
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:8989:8989"
      - "[fd7a:115c:a1e0::5a39:3504]:8989:8989" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:8989:8989"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
  ##################################################
  # 7. BAZARR (Subtitle/Caption Manager)
  ##################################################
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.15
        ipv6_address: fd00:dead:beef:2::15
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/bazarr/config:/config
      - /mnt/vault/media:/media
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:6767:6767"
      - "[fd7a:115c:a1e0::5a39:3504]:6767:6767" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:6767:6767"
    restart: unless-stopped
    depends_on:
      radarr:
        condition: service_started
      sonarr:
        condition: service_started
  ##################################################
  # 8. FLARESOLVERR (Challenge Solver)
  ##################################################
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.21
        ipv6_address: fd00:dead:beef:2::21
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:8191:8191"
      - "[fd7a:115c:a1e0::5a39:3504]:8191:8191" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:8191:8191"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LOG_LEVEL=info
    healthcheck:
      test: curl -f --silent --output /dev/null http://localhost:8191/ || exit 1
      interval: 5m        # Check every 5 minutes (Quiet logs)
      timeout: 10s
      retries: 3
      start_period: 20s   # Grace period for slow startup
      start_interval: 5s  # CRITICAL: Check rapidly (every 5s) during startup so Prowlarr doesn't wait 5 mins
    restart: unless-stopped   
  ##################################################
  # 9. PROFILARR (Quality Settings & Custom Format Syncs)
  ##################################################
  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    hostname: profilarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.19
        ipv6_address: fd00:dead:beef:2::19
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:6868:6868"
      - "[fd7a:115c:a1e0::5a39:3504]:6868:6868" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:6868:6868"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/vpn-arr-stack/profilarr/config:/config
    restart: unless-stopped
    depends_on:
      radarr:
        condition: service_started
      sonarr:
        condition: service_started
