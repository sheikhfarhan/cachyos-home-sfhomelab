# ----------------------------------------
# Network Definition - Have already set this up beforehand
# ----------------------------------------
networks:
  dockerapps-net:
    external: true
services:
  ##################################################
  # 1. JELLYFIN (Media Server)
  ##################################################
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    group_add:
      - "983" # Add the video GID
      - "987" # Add the render GID
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.10
        ipv6_address: fd00:dead:beef:2::10
    ports:
      # 1. Opens the door for the OVH-VPS proxy (Tailscale)
      - "100.110.20.1:8096:8096"
      - "[fd7a:115c:a1e0::5a39:3504]:8096:8096"
      # 2. Opens the door for our Home TV (Local LAN)
      - "192.168.0.100:8096:8096"
      
      # 3. Keeps localhost open for the Local Caddy proxy
      - "127.0.0.1:8096:8096"

    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      - /mnt/vault/media:/media
    #tmpfs:
    #  - /config/data/transcodes
    #devices:
    #  - /dev/dri/renderD128:/dev/dri/renderD128
    devices:
      # Pass the entire Direct Rendering Interface directory
      - /dev/dri:/dev/dri
    
    restart: unless-stopped

  ##################################################
  # 2. SEERR (Request Manager)
  ##################################################
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    hostname: seerr
    networks:
      dockerapps-net: 
        ipv4_address: 172.20.0.12
        ipv6_address: fd00:dead:beef:2::12
    ports:
      # Allows secure access via Tailscale mesh (from the VPS Caddy)
      - "100.110.20.1:5055:5055"
      # Allows secure access via Tailscale mesh (IPv6)
      - "[fd7a:115c:a1e0::5a39:3504]:5055:5055"
      # Allows local access via CachyOS terminal or SSH tunnel (Glass-Break)
      - "127.0.0.1:5055:5055"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ} 
    volumes:
      - ./seerr-config:/app/config 
#    healthcheck:
#      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
#      start_period: 20s
#      timeout: 3s
#      interval: 15s
#      retries: 3
    restart: unless-stopped
    depends_on:
      jellyfin:
        condition: service_started

