# ----------------------------------------
# Network Definition - Have already set this up beforehand
# ----------------------------------------
networks:
  dockerapps-net:
    external: true

services:
##################################################
# RADARR (Movie Management)
##################################################
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.13  
        ipv6_address: fd00:dead:beef:2::13
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/arrs/03-core-arrs/radarr/config:/config
      - /mnt/vault/media:/media
      - /mnt/crucial500/downloads:/downloads
    ports:
      # Allows secure access via Tailscale mesh
      - "10.80.0.1:7878:7878"
      - "[fd30:8fa7:ade1:f2e5:13a7:23c:717c:a555]:7878:7878" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:7878:7878"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:10.80.0.2"
    restart: unless-stopped

##################################################
# SONARR (TV Show Management)
##################################################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.14 
        ipv6_address: fd00:dead:beef:2::14
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/arrs/03-core-arrs/sonarr/config:/config
      - /mnt/vault/media:/media
      - /mnt/crucial500/downloads:/downloads
    ports:
      # Allows secure access via Tailscale mesh
      - "10.80.0.1:8989:8989"
      - "[fd30:8fa7:ade1:f2e5:13a7:23c:717c:a555]:8989:8989" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:8989:8989"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:10.80.0.2"
    restart: unless-stopped

##################################################
# BAZARR (Subtitle/Caption Manager)
##################################################
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.15
        ipv6_address: fd00:dead:beef:2::15
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/sfarhan/homelab/cachyos-home/media-stack/arrs/03-core-arrs/bazarr/config:/config
      - /mnt/vault/media:/media
    ports:
      # Allows secure access via Tailscale mesh
      - "10.80.0.1:6767:6767"
      - "[fd30:8fa7:ade1:f2e5:13a7:23c:717c:a555]:6767:6767" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:6767:6767"
    restart: unless-stopped
    depends_on:
      radarr:
        condition: service_started
      sonarr:
        condition: service_started

  subgen:
    image: mccloud/subgen:latest
    container_name: subgenai
    tty: true
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.34
        ipv6_address: fd00:dead:beef:2::34
    ports:
      # Allows secure access via NetBird mesh
      - "10.80.0.1:9000:9000"
      - "[fd30:8fa7:ade1:f2e5:13a7:23c:717c:a555]:9000:9000" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:9000:9000"
    environment:
      - PUID=1000
      - PGID=1000
      # --- Hardware & Performance (Crucial for CPU) ---
      - TRANSCRIBE_DEVICE=cpu
      - WHISPER_MODEL=base # Stick to 'base' or 'small'. 'medium' will choke a CPU.
      - WHISPER_THREADS=4 # Tells Whisper how many CPU cores to use. Adjust based on your CachyOS host.
      - CONCURRENT_TRANSCRIPTIONS=1 # NEVER set higher than 1 on CPU, or it will crash.
      - CLEAR_VRAM_ON_COMPLETE=True # Good practice even on CPU to clear RAM.
      
      # --- Translation Magic (The Wife Protocol) ---
      - TRANSCRIBE_OR_TRANSLATE=translate # This forces Whisper to output English from Korean audio.
      - NAMESUBLANG=en # Tags the resulting SRT file as English so Jellyfin recognize it.
      
      # --- System & Networking ---
      - WEBHOOKPORT=9000
      - DEBUG=True # Keep this on until you confirm the first Korean show translates successfully.
      - MODEL_PATH=/models
      
      # --- Path Mapping (If your folder structures differ) ---
      # Only change these to True if Bazarr's view of /tv is different than Subgen's view.
      - USE_PATH_MAPPING=False 
      #- PATH_MAPPING_FROM=/tv
      #- PATH_MAPPING_TO=/Volumes/TV

    volumes:
      # 1. The Model Cache (So it doesn't download 1GB every restart)
      - /home/sfarhan/homelab/cachyos-home/media-stack/arrs/03-core-arrs/subgen/models:/models
      # 2. The Media Volume
      - /mnt/vault/media:/mnt/vault/media
      
    restart: unless-stopped
    depends_on:
      bazarr:
        condition: service_started