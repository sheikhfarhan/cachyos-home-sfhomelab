##################################################
# ARCANE
##################################################
networks:
  dockerapps-net:
    external: true

services:

  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    hostname: arcane
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.17
        ipv6_address: fd00:dead:beef:2::17
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:3552:3552"
      - "[fd7a:115c:a1e0::5a39:3504]:3552:3552" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:3552:3552"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    volumes:
      - ./arcane-data:/app/data
    environment:
      - APP_URL=http://100.110.20.1:3552
      - DOCKER_HOST=tcp://172.20.0.28:2375
      - PUID=${PUID}
      - PGID=${PGID}
      - ENCRYPTION_KEY=${ARCANE_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
#    healthcheck:
#      test: ['CMD-SHELL', 'curl -fsS http://localhost:3552/api/health >/dev/null || exit 1']
#      interval: 30s
#      timeout: 5s
#      retries: 5
#      start_period: 20s
    restart: unless-stopped