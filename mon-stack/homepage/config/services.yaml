- Management (CachyOS Home Node):

    - Gluetun:
        icon: gluetun.png
        href: "#"
        description: VPN Gateway
        server: cachyos-local
        container: gluetun
        widget:
          type: gluetun
          url: http://172.20.0.11:8000
          key: {{HOMEPAGE_VAR_GLUETUN_KEY}}

    - Netbird Peer - CachyOS:
        icon: /icons/netbird.png
        href: https://netbird.sfhomelab.com/peers
        # added ping to machine's tailscale ID and removed container:
        ping: 10.80.0.1
        description: NetBird Subnet Mesh Network

    - Arcane:
        icon: arcane.png
        href: http://localhost:3552
        description: Container Management
        server: cachyos-local
        container: arcane
        widget:
          type: arcane
          url: http://172.20.0.17:3552
          env: 0 # required, 0 is Arcane default local environment
          key: {{HOMEPAGE_VAR_ARCANE_API_KEY}}
          fields: ["running", "stopped", "total", "image_updates"]
    
    - Dozzle:
        icon: dozzle.png
        href: http://172.20.0.26:8080
        description: Log Viewer
        server: cachyos-local
        container: dozzle
        #widget:
        #  type: dozzle
        #  url: http://172.20.0.26:8080

    - Kopia:
        icon: kopia.png
        href: http://172.20.0.33:51515
        server: cachyos-local
        container: kopia
        widget:
          type: kopia
          url: http://172.20.0.33:51515
          username: {{HOMEPAGE_VAR_KOPIA_USER}}
          password: {{HOMEPAGE_VAR_KOPIA_PASS}}
          snapshotHost: cachyos
          snapshotPath: /data/homelab-services

