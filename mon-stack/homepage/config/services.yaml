- OVH-VPS Remote Services:

    - Caddy Reverse Proxy:
        icon: caddy.png
        href: https://status.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: Edge Router & Web Server
        server: ovh-vps-remote
        container: vps-caddy
        widget:
          type: caddy
          url: http://10.80.0.2:2019/
          fields: ["upstreams", "requests", "requests_failed"]

    - Netbird Peer - OVH-VPS:
        icon: /icons/netbird.png
        href: https://netbird.sfhomelab.com/peers
        # added ping to machine's tailscale ID and removed container:
        ping: 10.80.0.2
        description: NetBird Subnet Mesh Network
    
    - CrowdSec:
        icon: crowdsec.png
        description: Security Brain
        server: ovh-vps-remote
        widget:
          type: crowdsec
          url: http://10.80.0.2:9090
          username: {{HOMEPAGE_VAR_CROWDSEC_USER}}
          password: {{HOMEPAGE_VAR_CROWDSEC_PASS}}
          limit24h: true
          fields: ["bans"]

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://kuma.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: Status & Alerting
        server: ovh-vps-remote
        container: uptime-kuma

    - Komodo:
        icon: komodo.png
        href: https://komodo.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: Stacks Management
        server: ovh-vps-remote
        container: komodo-core
        widget:
          type: komodo
          url: http://10.80.0.2:9120/
          key: {{HOMEPAGE_VAR_KOMODO_KEY}}
          secret: {{HOMEPAGE_VAR_KOMODO_SECRET}}
          showSummary: true # optional, default: false. Takes precedence over showStacks
          showStacks: true # optional, default: false
    
    - VoidAuth:
        icon: /icons/voidauth.png
        href: https://auth2.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        server: ovh-vps-remote
        container: voidauth
        description: Authentication

    - Beszel Hub:
        icon: beszel.png
        href: http://10.80.0.2:8090/
        description: System Monitoring
        server: ovh-vps-remote
        container: beszel-hub
        widget:
          type: beszel
          url: http://10.80.0.2:8090/
          username: {{HOMEPAGE_VAR_BESZEL_USER}}
          password: {{HOMEPAGE_VAR_BESZEL_PASS}}
          systemId: {{HOMEPAGE_VAR_BESZEL_SYSTEMID}}
          version: 2 # optional, default is 1

    - Gotify:
        icon: gotify.png
        href: https://gotify.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: Notifications
        server: ovh-vps-remote
        container: gotify
        widget:
          type: gotify
          url: https://gotify.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
          key: {{HOMEPAGE_VAR_GOTIFY_KEY}}

    - GoAccess:
        icon: goaccess.png
        href: http://10.80.0.2:7890/
        description: Web Log Analysis
        server: ovh-vps-remote
        container: goaccess

    - OpenCloud:
        icon: /icons/opencloud.png
        href: https://cloud.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: File Sync & Share
        server: ovh-vps-remote
        container: opencloud
        
    - BentoPDF:
        icon: /icons/bentopdf.png
        href: https://bentopdf.{{HOMEPAGE_VAR_ROOT_DOMAIN}}
        description: PDF Management
        server: ovh-vps-remote
        container: bentopdf