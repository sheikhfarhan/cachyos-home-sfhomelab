networks:
  dockerapps-net:
    external: true

services:
  ##################################################
  # 1. DOCKER SOCKET PROXY (The Gatekeeper)
  ##################################################
  # This container is the ONLY one that touches the real socket.
  # All other apps talk to this proxy via TCP.
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: cachyos-home-socket-proxy
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.28
        ipv6_address: fd00:dead:beef:2::28
    # ADD THIS FOR TAILSCALE PORT BINDING (for Remote Access to Docker API)
    ports:
      - "100.110.20.1:2375:2375"
      - "[fd7a:115c:a1e0::5a39:3504]:2375:2375"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    environment:
      # READ ACCESS (Allowed)
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - EXEC=1
      - VOLUMES=1
      - SERVICES=1    # (Optional, good for stack viewing)
      - TASKS=1       # (Optional)
      - EVENTS=1      # Critical for real-time updates
      - PING=1
      - VERSION=1
      # WRITE ACCESS (Blocked by Default - "Read Only" Mode)
      # This prevents Homepage/Portainer/Arcane from creating/deleting containers.
      # If we need to manage containers via Portainer/Arcane, change POST to 1.
      - POST=1
      - DELETE=1
      - AUTH=0
      - SECRETS=0
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  ##################################################
  # 2. HOMEPAGE (Dashboard)
  ##################################################
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.25
        ipv6_address: fd00:dead:beef:2::25
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:3000:3000"
      - "[fd7a:115c:a1e0::5a39:3504]:3000:3000" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:3000:3000"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=951
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=*
      # Use the Proxy instead of the Socket
      - DOCKER_HOST=tcp://172.20.0.28:2375
      # Our services.yaml href's URL can lookup .env file for the root domain
      - HOMEPAGE_VAR_ROOT_DOMAIN=${HOMEPAGE_VAR_ROOT_DOMAIN}
      - HOMEPAGE_VAR_KOPIA_USER=${HOMEPAGE_VAR_KOPIA_USER}
      - HOMEPAGE_VAR_KOPIA_PASS=${HOMEPAGE_VAR_KOPIA_PASS}
      - HOMEPAGE_VAR_ARCANE_API_KEY=${HOMEPAGE_VAR_ARCANE_API_KEY}
    volumes:
      - ./homepage/config:/app/config
      - ./homepage/config/icons:/app/public/icons
      - ./homepage/config/images:/app/public/images
      # Host Disk Mounts
      - /mnt/vault:/mnt/vault_disk:ro             # <-- NEW: Points to the HDD Vault
      - /mnt/crucial500:/mnt/scratch_disk:ro      # <-- NEW: Points to the SSD Scratch Drive
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_started

  ##################################################
  # 3. DOZZLE (Log Viewer)
  ##################################################
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    hostname: dozzle
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.26
        ipv6_address: fd00:dead:beef:2::26
    volumes:
      - ./dozzle/dozzle-data:/data
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:9090:8080"
      - "[fd7a:115c:a1e0::5a39:3504]:9090:8080" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:9090:8080"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    environment:
      # Use the Proxy
      - DOCKER_HOST=tcp://172.20.0.28:2375
    restart: unless-stopped
    depends_on:
      - socket-proxy

  ##################################################
  # 4. BESZEL AGENT (Metrics Collector for CachyOS)
  ##################################################
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    hostname: beszel-agent
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.32
        ipv6_address: fd00:dead:beef:2::32
    # No longer need for ports for Push Mode!
    #ports:
      # Expose this port so the VPS Hub can scrape it via Tailscale!
      #- "45876:45876"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    environment:
      - TZ=${TZ}   
      - PORT=45876
      # This MUST match the key generated in the VPS Hub UI
      - KEY=${BESZEL_PUBLIC_KEY}
      - TOKEN=${BESZEL_CACHYOS_TOKEN}
      - DOCKER_HOST=tcp://172.20.0.28:2375
      - FILESYSTEM=/dev/nvme0n1p2
      # NEW: Enable Push Mode via WebSockets (Point to Beszel Hub via Tailscale Net)
      - HUB_URL=http://100.110.20.2:8090
    volumes:
      - ./beszel/beszel_agent_data:/var/lib/beszel-agent
      - /:/extra-filesystems/nvme0n1__CachyOS:ro
      - /mnt/crucial500/.beszel:/extra-filesystems/sdc__Scratch_SSD:ro
      - /mnt/vault/.beszel:/extra-filesystems/HDD_Vault:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    restart: unless-stopped
    depends_on:
      - socket-proxy

  ##################################################
  # 5. ARCANE
  ##################################################
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    hostname: arcane
    networks:
      dockerapps-net:
        ipv4_address: 172.20.0.17
        ipv6_address: fd00:dead:beef:2::17
    ports:
      # Allows secure access via Tailscale mesh
      - "100.110.20.1:3552:3552"
      - "[fd7a:115c:a1e0::5a39:3504]:3552:3552" # IPv6 Access
      # Allows local access via CachyOS terminal or SSH tunnel
      - "127.0.0.1:3552:3552"
    extra_hosts:
      # Intercept Gotify traffic and route it directly over Tailscale!
      - "gotify.${ROOT_DOMAIN}:100.110.20.2"
    volumes:
      - ./arcane/arcane-data:/app/data
    environment:
      - APP_URL=http://localhost:3552
      - DOCKER_HOST=tcp://172.20.0.28:2375
      - PUID=${PUID}
      - PGID=${PGID}
      - ENCRYPTION_KEY=${ARCANE_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3552/api/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    depends_on:
      - socket-proxy
